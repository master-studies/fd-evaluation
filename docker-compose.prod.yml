volumes:
  sqlserver-data:

networks:
  microservices-network:
    driver: bridge

services:
  svc-discovery-service:
    build:
      context: ./services/svc-discovery-service
      dockerfile: Dockerfile
    container_name: svc-discovery-service
    expose:
      - "4706"
    env_file:
      - ./.env
    environment:
      - SPRING_APPLICATION_NAME=svc-discovery-service
      - SERVER_PORT=4706
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4706/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - microservices-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    env_file:
      - ./.env
    environment:
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
    expose:
      - "1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-off init service to seed database after SQL Server is healthy
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - microservices-network
    volumes:
      - ./scripts:/scripts:ro
    env_file:
      - ./.env
    entrypoint: ["/bin/sh", "-c", "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$$MSSQL_SA_PASSWORD\" -i /scripts/init-db.sql -C"]
    restart: "no"

  svc-fd-discovery:
    build:
      context: ./services/svc-fd-discovery
      dockerfile: Dockerfile
    container_name: svc-fd-discovery
    expose:
      - "4705"
    depends_on:
      sqlserver:
        condition: service_healthy
      svc-discovery-service:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SERVER_PORT: 4705
    networks:
      - microservices-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4705/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  svc-succinctness:
    build:
      context: ./services/svc-succinctness
      dockerfile: Dockerfile
    container_name: svc-succinctness
    expose:
      - "4704"
    depends_on:
      sqlserver:
        condition: service_healthy
      svc-discovery-service:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SERVER_PORT: 4704
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4704/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  svc-coverage:
    build:
      context: ./services/svc-coverage
      dockerfile: Dockerfile
    container_name: svc-coverage
    expose:
      - "4703"
    depends_on:
      sqlserver:
        condition: service_healthy
      svc-discovery-service:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SERVER_PORT: 4703
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4703/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
  
  svc-genuineness:
    build:
      context: ./services/svc-genuineness
      dockerfile: Dockerfile
    container_name: svc-genuineness
    expose:
      - "4702"
    depends_on:
      sqlserver:
        condition: service_healthy
      svc-discovery-service:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SERVER_PORT: 4702
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4702/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  svc-entropy:
    build:
      context: ./services/svc-entropy
      dockerfile: Dockerfile
    container_name: svc-entropy
    expose:
      - "4701"
    depends_on:
      sqlserver:
        condition: service_healthy
      svc-discovery-service:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SERVER_PORT: 4701
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4701/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  client:
    build:
      context: ./client-app
      dockerfile: Dockerfile
      target: ${CLIENT_BUILD_TARGET:-production}
    container_name: client-app
    ports:
      - "4700:4700"
    env_file:
      - ./client-app/.env
    networks:
      - microservices-network